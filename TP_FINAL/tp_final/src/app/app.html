<!-- Layout principal : décorations de fond, en-tête, contenu des pages, pied de page -->
<div class="relative flex min-h-dvh flex-col">
  <!-- Formes décoratives fixes (n'affectent pas les clics) -->
  <div class="pointer-events-none fixed inset-0 -z-10 overflow-hidden" aria-hidden="true">
    <div
      class="absolute -right-16 top-24 h-40 w-40 animate-float rounded-full border-4 border-ink bg-cyan-glow shadow-[8px_8px_0_#1a1a1a]"
    ></div>
    <div
      class="absolute -left-8 bottom-32 h-28 w-28 rotate-12 rounded-lg border-4 border-ink bg-cosmic shadow-[6px_6px_0_#1a1a1a]"
    ></div>
    <div
      class="absolute right-1/4 top-1/2 h-24 w-24 -rotate-6 rounded-full border-4 border-ink bg-portal shadow-[6px_6px_0_#1a1a1a]"
    ></div>
    <div
      class="absolute bottom-8 right-8 font-display text-[8rem] leading-none text-ink/5 select-none"
    >
      ?
    </div>
  </div>

  <!-- Barre de navigation sticky -->
  <header
    class="sticky top-0 z-50 border-b-4 border-ink bg-white shadow-[0_6px_0_#1a1a1a]"
  >
    <div
      class="mx-auto flex max-w-6xl flex-wrap items-center justify-between gap-4 px-4 py-4 sm:px-6"
    >
      <a
        routerLink="/dashboard"
        class="group flex items-center gap-2.5 no-underline transition-transform hover:scale-[1.02]"
      >
        <span
          class="flex h-11 w-11 items-center justify-center rounded-lg border-2 border-ink bg-cyan-glow text-2xl shadow-[4px_4px_0_#1a1a1a] transition-shadow group-hover:shadow-[2px_2px_0_#1a1a1a]"
          >👽</span
        >
        <span class="font-display text-2xl tracking-wide text-ink sm:text-3xl">
          Rick & Morty
          <span class="block text-sm font-sans font-bold text-portal-dark">Explorer</span>
        </span>
      </a>

      <nav class="flex flex-wrap items-center gap-1 sm:gap-1.5">
        <a routerLink="/dashboard" routerLinkActive="nav-link-active" class="nav-link"
          >Dashboard</a
        >
        <a routerLink="/characters" routerLinkActive="nav-link-active" class="nav-link"
          >Personnages</a
        >
        <a routerLink="/locations" routerLinkActive="nav-link-active" class="nav-link">Lieux</a>
        <a routerLink="/episodes" routerLinkActive="nav-link-active" class="nav-link"
          >Épisodes</a
        >
        <!-- Lien favoris avec badge dynamique (signal badgeFavoris) -->
        <a routerLink="/favoris" routerLinkActive="nav-link-active" class="nav-link">
          Favoris
          @if (badgeFavoris()) {
            <span
              class="min-w-[1.25rem] rounded-md border-2 border-ink bg-portal px-1.5 py-0.5 text-center text-[0.65rem] font-bold text-white"
              >{{ badgeFavoris() }}</span
            >
          }
        </a>
        <a routerLink="/contact" routerLinkActive="nav-link-active" class="nav-link">Contact</a>
      </nav>
    </div>
  </header>

  <!-- Zone des pages chargées par le routeur -->
  <main class="mx-auto w-full max-w-6xl flex-1 px-4 py-8 sm:px-6 sm:py-10">
    <router-outlet />
  </main>

  <footer
    class="border-t-4 border-ink bg-white py-5 text-center text-sm font-medium text-stone-600"
  >
    API —
    <a
      href="https://rickandmortyapi.com"
      target="_blank"
      rel="noopener"
      class="font-bold text-portal-dark transition-colors hover:text-cosmic"
      >rickandmortyapi.com</a
    >
  </footer>
</div>
