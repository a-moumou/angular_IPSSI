<div class="min-h-screen flex items-center justify-center bg-gradient-to-br from-[#1a1a2e] via-[#16213e] to-[#0f3460]">
  <div class="bg-white/10 backdrop-blur-md border border-white/20 rounded-3xl px-10 py-14 text-center w-[90%] max-w-md shadow-2xl text-white">

    <h1 class="text-3xl font-bold mb-6 bg-gradient-to-r from-purple-300 to-blue-300 bg-clip-text text-transparent">
      Bonjour, mon premier projet !
    </h1>

    <img
      class="w-28 h-28 rounded-full border-4 border-white/30 mx-auto mb-5 object-cover"
      src="https://api.dicebear.com/7.x/initials/svg?seed=Mouad&backgroundColor=667eea"
      alt="Avatar Mouad"
    />

    <p class="text-white/75 text-sm mb-1">Un message de</p>
    <p class="text-2xl font-bold tracking-widest text-blue-300 mb-8">MOUAD</p>

    <button
      (click)="onContact()"
      class="px-10 py-3 bg-gradient-to-r from-indigo-500 to-purple-600 text-white font-semibold rounded-full tracking-wide shadow-lg hover:-translate-y-1 hover:shadow-indigo-500/60 transition-all duration-200 cursor-pointer"
    >
      Contacter
    </button>

    <app-citation />

    <div class="mt-6 flex justify-center">
      <app-meteo-carte />
    </div>

  </div>
</div>
