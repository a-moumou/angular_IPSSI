<div class="bg-gradient-to-br from-sky-500 to-blue-700 text-white rounded-2xl p-6 w-72 shadow-2xl">

  <form (ngSubmit)="rechercher()" class="flex gap-2 mb-5">
    <input
      [(ngModel)]="ville"
      name="ville"
      type="text"
      placeholder="Rechercher une ville..."
      class="flex-1 rounded-full px-4 py-2 text-sm text-gray-800 placeholder-gray-400 bg-white/90 focus:bg-white outline-none transition"
    />
    <button type="submit" class="bg-white/20 hover:bg-white/30 border border-white/40 rounded-full p-2 transition cursor-pointer">
      <lucide-icon [img]="Search" size="18" />
    </button>
  </form>

  @if (chargement()) {
    <div class="flex items-center justify-center h-36">
      <span class="animate-pulse text-white/80">Chargement...</span>
    </div>
  }

  @if (erreur()) {
    <div class="flex items-center justify-center h-36">
      <span class="text-white/90 text-sm text-center">Ville introuvable.</span>
    </div>
  }

  @if (!chargement() && !erreur() && meteo()) {
    <div>
      <h2 class="text-3xl font-bold mb-1">{{ meteo().ville }}</h2>
      <p class="text-sm text-blue-200 mb-4">Météo actuelle</p>

      <div class="flex items-center justify-between mb-4">
        <span class="text-6xl font-extrabold">{{ meteo().temperature }}°C</span>
        <lucide-icon [img]="icon" size="64" strokeWidth="1.5" />
      </div>

      <p class="text-lg font-medium mb-4">{{ meteo().condition }}</p>

      <div class="flex justify-between border-t border-white/30 pt-4 text-sm">
        <div class="flex flex-col items-center gap-1">
          <lucide-icon [img]="Droplets" size="20" />
          <span class="text-blue-200 text-xs">Humidité</span>
          <span class="font-semibold">{{ meteo().humidite }}%</span>
        </div>
        <div class="w-px bg-white/30"></div>
        <div class="flex flex-col items-center gap-1">
          <lucide-icon [img]="Wind" size="20" />
          <span class="text-blue-200 text-xs">Vent</span>
          <span class="font-semibold">{{ meteo().vent }} km/h</span>
        </div>
      </div>
    </div>
  }

</div>
